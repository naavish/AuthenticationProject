spring.application.name=AuthenticationProject

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username = ${SPRING_DATASOURCE_USERNAME}
spring.datasourse.password = ${SPRING_DATASOURCE_PASSWORD}
spring.datasourse.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl = validate

spring.jpa.show-sql = true

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

spring.liquidbase.enabled =true
spring.liquidbase.change-log = classpath:db/changelog/db.changelog-master.yamlCopy

security.jwt.secret-key = ${JWT_SECRET_KEY}
security.jwt.expiration-time=3600000

